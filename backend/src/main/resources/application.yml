spring:
  application:
    name: demo

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    # 환경 변수 사용, 없을 시 로컬 머신의 로컬 DB 우선 사용 (도커에서는 docker-compose.yml에서 오버라이드)
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://localhost:3306/hyperlocal_db}
    username: ${SPRING_DATASOURCE_USERNAME:gongmatch_user}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database: mysql # DB 종류 명시
    database-platform: org.hibernate.dialect.MySQLDialect # Dialect 강제 지정
    properties:
      hibernate:
        format_sql: false
        # MariaDB/MySQL 호환성을 위해 Dialect 재확인
        dialect: org.hibernate.dialect.MySQLDialect 

# JWT 설정 (Railway 환경 변수에서 비밀키 로드 권장)
jwt:
  secret: ${JWT_SECRET:Z29uZ21hdGNoLWh5cGVybG9jYWwtcHJvamVjdC1zZWNyZXQta2V5LTIwMjUtc3ByaW5nLWJvb3Q=}
  expiration: 86400000 

# 로그 레벨 (운영 환경에 적합하도록 조정)
logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.example.demo: DEBUG
