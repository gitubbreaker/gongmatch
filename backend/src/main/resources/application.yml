spring:
  application:
    name: demo

  datasource:
    driver-class-name: org.mariadb.jdbc.Driver
    # Railway 환경 변수 사용, 없을 시 로컬 도커 주소 기본값 사용
    url: ${SPRING_DATASOURCE_URL:jdbc:mariadb://db:3306/hyperlocal_db}
    username: ${SPRING_DATASOURCE_USERNAME:gongmatch_user}
    password: ${SPRING_DATASOURCE_PASSWORD:password123}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false # 운영 시에는 꺼두는 것이 깔끔함
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect

# JWT 설정 (Railway 환경 변수에서 비밀키 로드 권장)
jwt:
  secret: ${JWT_SECRET:Z29uZ21hdGNoLWh5cGVybG9jYWwtcHJvamVjdC1zZWNyZXQta2V5LTIwMjUtc3ByaW5nLWJvb3Q=}
  expiration: 86400000 

# 로그 레벨 (운영 환경에 적합하도록 조정)
logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.example.demo: DEBUG
