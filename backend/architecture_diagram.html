<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>공매치 아키텍처 다이어그램 (Docker 및 크롤링 포함)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .capture-box {
            width: 1024px;
            height: 576px;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            padding: 30px 40px;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
        }
        
        .node-card {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            z-index: 10;
        }
        
        .cloud-container {
            border: 3px dashed #6366f1;
            border-radius: 20px;
            background-color: #e0e7ff;
            background-opacity: 0.3;
            position: relative;
            padding: 50px 30px 30px 30px;
            width: 580px;
            height: 380px;
        }
        
        .cloud-label {
            position: absolute;
            top: -16px;
            right: 30px;
            background-color: #4f46e5;
            color: white;
            padding: 6px 20px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 1.1rem;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .docker-container {
            border: 2px dashed #0ea5e9;
            border-radius: 16px;
            background-color: rgba(255, 255, 255, 0.6);
            padding: 40px 20px 20px 20px;
            position: relative;
            width: 100%;
            height: 200px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-top: 50px;
        }

        .docker-label {
            position: absolute;
            top: -14px;
            left: 20px;
            background-color: #0ea5e9;
            color: white;
            padding: 4px 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .line { position: absolute; background-color: #94a3b8; z-index: 1; }
        
        /* 화살표 머리 */
        .arrow-right::after {
            content: ''; position: absolute; right: -6px; top: -4px;
            border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-left: 10px solid #94a3b8;
        }
        .arrow-left::after {
            content: ''; position: absolute; left: -6px; top: -4px;
            border-top: 6px solid transparent; border-bottom: 6px solid transparent; border-right: 10px solid #94a3b8;
        }
        .arrow-down::after {
            content: ''; position: absolute; bottom: -6px; left: -4px;
            border-left: 6px solid transparent; border-right: 6px solid transparent; border-top: 10px solid #94a3b8;
        }
        .arrow-up::after {
            content: ''; position: absolute; top: -6px; left: -4px;
            border-left: 6px solid transparent; border-right: 6px solid transparent; border-bottom: 10px solid #94a3b8;
        }
    </style>
</head>
<body>

    <div class="capture-box">
        
        <h2 class="text-2xl font-extrabold text-gray-800 mb-6 border-l-8 border-indigo-600 pl-4">
            공매치(GongMatch) 전체 시스템 아키텍처
        </h2>

        <div class="relative w-full h-full flex justify-between items-start px-2">
            
            <!-- 왼쪽 파트 (사용자 & 프론트엔드) -->
            <div class="flex flex-col items-center relative" style="width: 180px; margin-top: 20px;">
                
                <div class="node-card w-full mb-12">
                    <svg class="w-10 h-10 text-gray-700 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    <span class="font-bold text-gray-800 text-base">공매치 회원</span>
                    <span class="text-xs text-gray-500 text-center">대학생 / 지원자</span>
                </div>

                <div class="line arrow-down" style="width: 3px; height: 48px; top: 105px; left: 90px;"></div>
                <div class="absolute bg-white px-2 text-xs font-bold text-gray-500" style="left: 100px; top: 120px; z-index: 5;">
                    웹 브라우저
                </div>

                <div class="node-card border-blue-400 border-2 w-full">
                    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/react/react-original.svg" class="w-12 h-12 mb-1" />
                    <span class="font-bold text-gray-800 text-base">React</span>
                    <span class="text-xs text-blue-500 font-semibold">Frontend UI</span>
                </div>
            </div>

            <!-- 가운데 연결선 (프론트 -> 백엔드) -->
            <div class="line arrow-right" style="width: 120px; height: 3px; left: 200px; top: 250px;"></div>
            <div class="absolute bg-white px-2 text-sm font-bold text-indigo-600" style="left: 215px; top: 225px; z-index: 5;">
                REST API
            </div>

            <!-- 오른쪽 파트 (Railway 클라우드) -->
            <div class="cloud-container">
                
                <div class="cloud-label">
                    Railway Cloud Platform
                </div>

                <!-- GitHub -> Railway 연결 라인 -->
                <div class="absolute line arrow-down" style="width: 3px; height: 40px; top: 90px; left: 105px;"></div>
                <div class="absolute line" style="width: 25px; height: 3px; top: 75px; left: 80px;"></div>

                <div class="flex justify-between items-start w-full relative">
                    <!-- GitHub -->
                    <div class="node-card border-gray-800 border-2 py-2" style="width: 150px;">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/github/github-original.svg" class="w-8 h-8 mb-1" />
                        <span class="font-bold text-gray-800 text-sm">GitHub Actions</span>
                        <span class="text-xs text-gray-500 font-semibold text-center mt-1">소스코드 자동 배포</span>
                    </div>

                    <!-- 외부 API 및 크롤링 데이터 수집 파트 (공매치 핵심 누락 요소 반영!) -->
                    <div class="flex flex-col items-end relative">
                        <div class="node-card border-teal-500 border-2 py-2 mb-2 bg-teal-50 shadow-sm" style="width: 160px;">
                            <span class="text-lg mb-1">🌐</span>
                            <span class="font-bold text-teal-800 text-sm">Wevity 크롤러</span>
                            <span class="text-xs text-teal-600">공모전 포스터/일정 추출</span>
                        </div>
                        <div class="node-card border-purple-500 border-2 py-2 bg-purple-50 shadow-sm" style="width: 160px;">
                            <span class="text-lg mb-1">🏛️</span>
                            <span class="font-bold text-purple-800 text-sm">K-Startup 공공 API</span>
                            <span class="text-xs text-purple-600">지원사업 데이터 동기화</span>
                        </div>
                    </div>
                </div>

                <!-- Docker 컨테이너 영역 -->
                <div class="docker-container">
                    <div class="docker-label">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/docker/docker-original.svg" class="w-5 h-5 filter brightness-0 invert" />
                        Docker Container Env
                    </div>

                    <!-- 외부 API -> Spring Boot 수집 화살표 -->
                    <div class="absolute line arrow-down" style="width: 3px; height: 40px; top: -40px; left: 450px;"></div>
                    <div class="absolute text-xs font-bold text-teal-600 bg-white px-1" style="top: -25px; left: 395px; z-index: 5;">데이터 수집</div>

                    <!-- Spring Boot -->
                    <div class="node-card border-green-500 border-2 shadow-md relative z-20" style="width: 160px;">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/spring/spring-original.svg" class="w-12 h-12 mb-1" />
                        <span class="font-bold text-gray-800">Spring Boot</span>
                        <span class="text-xs text-green-600 font-semibold text-center mt-1">Backend API<br>매칭 스코어 엔진</span>
                    </div>

                    <!-- Spring Boot <-> MySQL 화살표 -->
                    <div class="line arrow-right" style="width: 60px; height: 3px; left: 215px; top: 120px;"></div>
                    <div class="line arrow-left" style="width: 60px; height: 3px; left: 215px; top: 130px;"></div>

                    <!-- MySQL -->
                    <div class="node-card border-orange-400 border-2 shadow-md relative z-20" style="width: 150px;">
                        <img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/mysql/mysql-original.svg" class="w-12 h-12 mb-1" />
                        <span class="font-bold text-gray-800">MySQL</span>
                        <span class="text-xs text-orange-600 font-semibold text-center mt-1">사용자 & 프로젝트 DB</span>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
